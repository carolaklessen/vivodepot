name: Mirror to openCode

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (vollständige History)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push zu openCode
        run: |
          git remote add opencode https://oauth2:${{ secrets.OPENCODE_TOKEN }}@gitlab.opencode.de/oc000142426528/vivodepot.git
          git push opencode main --force
